<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neo Web Control Panel</title>
  <meta name="description" content="A futuristic web dashboard for viewing URLs with theme switching, history, and smooth animations.">
  <meta name="theme-color" content="#0a0a12">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════════════
   Styles
   ═══════════════════════════════════════════════════════════ */

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-base:      #07070d;
  --bg-surface:   rgba(255,255,255,0.03);
  --bg-elevated:  rgba(255,255,255,0.06);
  --bg-glass:     rgba(14,14,24,0.72);
  --border:       rgba(255,255,255,0.07);
  --border-focus: rgba(124,58,237,0.55);
  --text-primary:   #ededf0;
  --text-secondary: #6e6e82;
  --text-muted:     #44445a;
  --accent:       #7c3aed;
  --accent-light: #a78bfa;
  --accent-glow:  rgba(124,58,237,0.22);
  --danger:       #ef4444;
  --danger-glow:  rgba(239,68,68,0.18);
  --radius-lg:    16px;
  --radius-md:    12px;
  --radius-sm:    8px;
  --radius-pill:  999px;
  --shadow-lg:    0 8px 40px rgba(0,0,0,0.45);
  --blur:         24px;
  --font-sans:    'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono:    'JetBrains Mono', 'Fira Code', monospace;
  --ease:         cubic-bezier(0.4, 0, 0.2, 1);
  --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
  --duration:     0.25s;
}
[data-theme="light"] {
  --bg-base:      #f0f0f5;
  --bg-surface:   rgba(0,0,0,0.025);
  --bg-elevated:  rgba(0,0,0,0.045);
  --bg-glass:     rgba(255,255,255,0.72);
  --border:       rgba(0,0,0,0.07);
  --border-focus: rgba(124,58,237,0.45);
  --text-primary:   #1a1a2e;
  --text-secondary: #6b7280;
  --text-muted:     #9ca3af;
  --accent:       #6d28d9;
  --accent-light: #8b5cf6;
  --accent-glow:  rgba(109,40,217,0.14);
  --danger:       #dc2626;
  --danger-glow:  rgba(220,38,38,0.12);
  --shadow-lg:    0 8px 40px rgba(0,0,0,0.07);
}

html { font-family: var(--font-sans); font-size: 16px; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body { background: var(--bg-base); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; transition: background var(--duration) var(--ease), color var(--duration) var(--ease); }

#particle-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.5; }
[data-theme="light"] #particle-canvas { opacity: 0.22; }

.app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; max-width: 1480px; margin: 0 auto; padding: 0 clamp(0.75rem, 3vw, 1.5rem) 1.5rem; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 0; }
.header__brand { display: flex; align-items: center; gap: 0.75rem; }
.header__badge { font-family: var(--font-mono); font-size: 0.65rem; font-weight: 500; padding: 0.15rem 0.5rem; border-radius: var(--radius-pill); background: var(--accent-glow); color: var(--accent-light); letter-spacing: 0.04em; }
.header__actions { display: flex; align-items: center; gap: 0.5rem; }

.logo { display: flex; align-items: center; gap: 0.55rem; }
.logo__icon { width: 30px; height: 30px; color: var(--accent); filter: drop-shadow(0 0 10px var(--accent-glow)); transition: filter var(--duration) var(--ease); }
.logo__icon:hover { filter: drop-shadow(0 0 16px var(--accent-glow)) brightness(1.15); }
.logo__text { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.03em; color: var(--text-primary); }
.logo__accent { color: var(--accent); }

.icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg-surface); backdrop-filter: blur(12px); color: var(--text-secondary); cursor: pointer; transition: all var(--duration) var(--ease); }
.icon-btn:hover { color: var(--text-primary); background: var(--bg-elevated); border-color: var(--border-focus); transform: translateY(-1px); box-shadow: 0 4px 16px var(--accent-glow); }
.icon-btn:active { transform: translateY(0) scale(0.97); }
.icon-btn svg { width: 18px; height: 18px; }
.icon-btn--sm { width: 32px; height: 32px; }
.icon-btn--sm svg { width: 15px; height: 15px; }

[data-theme="dark"]  .icon--moon { display: none; }
[data-theme="light"] .icon--sun  { display: none; }

/* Controls */
.controls { margin-bottom: 1rem; }
.controls__row { display: flex; gap: 0.75rem; align-items: stretch; }

.input-wrap { flex: 1; display: flex; align-items: center; background: var(--bg-glass); backdrop-filter: blur(var(--blur)); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 0 0.6rem; transition: border-color var(--duration) var(--ease), box-shadow var(--duration) var(--ease); }
.input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow-lg); }
.input-wrap__icon { width: 18px; height: 18px; flex-shrink: 0; color: var(--text-muted); margin-right: 0.5rem; }
.input-wrap__field { flex: 1; border: none; background: transparent; color: var(--text-primary); font-family: var(--font-mono); font-size: 0.85rem; padding: 0.9rem 0.35rem; outline: none; min-width: 0; }
.input-wrap__field::placeholder { color: var(--text-muted); }
.input-wrap__action { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; flex-shrink: 0; border: none; border-radius: var(--radius-sm); background: transparent; color: var(--text-muted); cursor: pointer; transition: all var(--duration) var(--ease); }
.input-wrap__action:hover { background: var(--bg-elevated); color: var(--accent); }
.input-wrap__action svg { width: 15px; height: 15px; }

.controls__buttons { display: flex; gap: 0.5rem; }

.btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0 1.5rem; height: 48px; border: none; border-radius: var(--radius-lg); font-family: var(--font-sans); font-size: 0.875rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all var(--duration) var(--ease); letter-spacing: 0.01em; }
.btn svg { width: 16px; height: 16px; }
.btn--primary { background: linear-gradient(135deg, var(--accent), var(--accent-light)); color: #fff; box-shadow: 0 2px 16px var(--accent-glow); }
.btn--primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 24px var(--accent-glow); filter: brightness(1.08); }
.btn--primary:active:not(:disabled) { transform: translateY(0) scale(0.98); }
.btn--stop { background: var(--bg-elevated); color: var(--text-secondary); border: 1px solid var(--border); }
.btn--stop:hover:not(:disabled) { background: var(--danger); color: #fff; border-color: var(--danger); box-shadow: 0 2px 16px var(--danger-glow); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; filter: none !important; box-shadow: none !important; }

/* Status */
.status { margin-top: 0.7rem; padding: 0.6rem 1rem; background: var(--bg-glass); backdrop-filter: blur(var(--blur)); border: 1px solid var(--border); border-radius: var(--radius-md); animation: slideDown 0.3s var(--ease); }
.status.hidden { display: none; }
.status__row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
.status__spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.65s linear infinite; }
.status__text { font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-secondary); }
.status__track { width: 100%; height: 3px; background: var(--bg-elevated); border-radius: var(--radius-pill); overflow: hidden; }
.status__fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-light), var(--accent)); background-size: 200% 100%; border-radius: var(--radius-pill); transition: width 0.45s var(--ease); animation: shimmer 2s linear infinite; }

/* Viewer */
.viewer { flex: 1; position: relative; border-radius: var(--radius-lg); overflow: hidden; background: var(--bg-glass); backdrop-filter: blur(var(--blur)); border: 1px solid var(--border); min-height: 420px; display: flex; align-items: center; justify-content: center; transition: all var(--duration) var(--ease); }
.viewer__state { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; animation: fadeIn 0.4s var(--ease); }
.viewer__state.hidden { display: none; }
.viewer__idle-icon { width: 80px; height: 80px; color: var(--text-muted); opacity: 0.25; margin-bottom: 1.5rem; animation: float 5s ease-in-out infinite; }
.viewer__idle-title { font-size: 1.1rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.3rem; }
.viewer__idle-sub { font-size: 0.82rem; color: var(--text-muted); }

.loader { position: relative; width: 64px; height: 64px; margin-bottom: 1.25rem; }
.loader__ring { position: absolute; inset: 4px; border: 2.5px solid transparent; border-radius: 50%; border-top-color: var(--accent); animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite; }
.loader__ring:nth-child(1) { inset: 0; animation-delay: -0.45s; border-top-color: var(--accent); }
.loader__ring:nth-child(2) { inset: 6px; animation-delay: -0.3s; border-top-color: var(--accent-light); }
.loader__ring:nth-child(3) { inset: 12px; animation-delay: -0.15s; border-top-color: var(--accent); opacity: 0.6; }
.loader__core { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; margin: -4px 0 0 -4px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 12px var(--accent-glow); animation: pulse 1.5s ease-in-out infinite; }
.viewer__loader-label { font-family: var(--font-mono); font-size: 0.82rem; color: var(--text-secondary); }

.viewer__error-icon { width: 60px; height: 60px; color: var(--danger); opacity: 0.75; margin-bottom: 1rem; }
.viewer__error-title { font-size: 1.05rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.25rem; }
.viewer__error-msg { font-size: 0.82rem; color: var(--text-secondary); max-width: 380px; }

.viewer__frame { position: absolute; inset: 0; animation: fadeIn 0.5s var(--ease); }
.viewer__frame.hidden { display: none; }
#viewer-iframe { width: 100%; height: 100%; border: none; background: #fff; }

/* Sidebar */
.sidebar { position: fixed; top: 0; right: -360px; width: 340px; height: 100vh; background: var(--bg-glass); backdrop-filter: blur(32px); border-left: 1px solid var(--border); z-index: 100; padding: 1.5rem; display: flex; flex-direction: column; transition: right 0.4s var(--ease); box-shadow: -8px 0 40px rgba(0,0,0,0.25); }
.sidebar.open { right: 0; }
.sidebar__head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; padding-bottom: 0.85rem; border-bottom: 1px solid var(--border); }
.sidebar__title { font-size: 1rem; font-weight: 600; color: var(--text-primary); }
.sidebar__list { list-style: none; flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--bg-elevated) transparent; }
.sidebar__list::-webkit-scrollbar { width: 5px; }
.sidebar__list::-webkit-scrollbar-track { background: transparent; }
.sidebar__list::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: var(--radius-pill); }
.sidebar__item { display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem 0.75rem; border-radius: var(--radius-sm); cursor: pointer; transition: all var(--duration) var(--ease); margin-bottom: 0.15rem; border: 1px solid transparent; }
.sidebar__item:hover { background: var(--bg-elevated); border-color: var(--border); }
.sidebar__item:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
.sidebar__item-icon { width: 14px; height: 14px; flex-shrink: 0; color: var(--accent); opacity: 0.55; }
.sidebar__item-url { flex: 1; font-family: var(--font-mono); font-size: 0.73rem; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sidebar__item-time { font-size: 0.62rem; color: var(--text-muted); flex-shrink: 0; font-family: var(--font-mono); }
.sidebar__empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; color: var(--text-muted); }
.sidebar__empty svg { width: 28px; height: 28px; opacity: 0.3; }
.sidebar__empty p { font-size: 0.82rem; opacity: 0.5; }
.sidebar__empty.hidden { display: none; }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); backdrop-filter: blur(2px); z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.35s var(--ease); }
.overlay.visible { opacity: 1; pointer-events: auto; }

/* Toast */
#toast-container { position: fixed; bottom: 1.75rem; left: 50%; transform: translateX(-50%); z-index: 300; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; pointer-events: none; }
.toast { background: var(--bg-glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 0.55rem 1.15rem; font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-primary); opacity: 0; transform: translateY(10px) scale(0.95); transition: all 0.3s var(--ease-spring); pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateY(0) scale(1); }

/* Keyframes */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Responsive */
@media (max-width: 768px) {
  .app { padding: 0 0.75rem 1rem; }
  .controls__row { flex-direction: column; gap: 0.5rem; }
  .controls__buttons { width: 100%; }
  .btn { flex: 1; justify-content: center; padding: 0 1rem; }
  .sidebar { width: 300px; }
  .viewer { min-height: 320px; }
}
@media (max-width: 480px) {
  .logo__text { display: none; }
  .header__badge { display: none; }
  .btn { padding: 0 0.75rem; font-size: 0.8rem; height: 44px; }
  .input-wrap__field { font-size: 0.78rem; padding: 0.8rem 0.25rem; }
  .viewer { min-height: 260px; }
}
</style>
</head>
<body>

<canvas id="particle-canvas" aria-hidden="true"></canvas>
<div id="toast-container" aria-live="polite"></div>
<div id="history-overlay" class="overlay" aria-hidden="true"></div>

<div id="app" class="app">

  <header class="header" role="banner">
    <div class="header__brand">
      <div class="logo">
        <svg class="logo__icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <polygon points="16,2 28,9 28,23 16,30 4,23 4,9"/>
          <line x1="16" y1="2" x2="16" y2="30" opacity="0.3"/>
          <line x1="4" y1="9" x2="28" y2="9" opacity="0.3"/>
          <line x1="4" y1="23" x2="28" y2="23" opacity="0.3"/>
        </svg>
        <span class="logo__text">Neo<span class="logo__accent">Panel</span></span>
      </div>
      <span class="header__badge">v1.0</span>
    </div>
    <div class="header__actions">
      <button id="btn-history" class="icon-btn" title="Open history" aria-label="Toggle history panel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </button>
      <button id="btn-theme" class="icon-btn" title="Toggle theme" aria-label="Switch theme">
        <svg class="icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <section class="controls" role="search" aria-label="URL input controls">
    <div class="controls__row">
      <div class="input-wrap">
        <svg class="input-wrap__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <input id="url-input" type="url" class="input-wrap__field" placeholder="Enter URL — e.g. https://example.com" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-label="Website URL">
        <button id="btn-paste" class="input-wrap__action" title="Paste from clipboard" aria-label="Paste URL from clipboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
        </button>
        <button id="btn-copy" class="input-wrap__action" title="Copy URL" aria-label="Copy URL to clipboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
      <div class="controls__buttons">
        <button id="btn-open" class="btn btn--primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <span>Open</span>
        </button>
        <button id="btn-stop" class="btn btn--stop" disabled aria-disabled="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
          <span>Stop</span>
        </button>
      </div>
    </div>
    <div id="status-bar" class="status hidden" role="status" aria-live="polite">
      <div class="status__row">
        <span class="status__spinner" aria-hidden="true"></span>
        <span id="status-text" class="status__text">Initializing...</span>
      </div>
      <div class="status__track"><div id="progress-bar" class="status__fill"></div></div>
    </div>
  </section>

  <main class="viewer" role="main">
    <div id="state-idle" class="viewer__state">
      <svg class="viewer__idle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <h2 class="viewer__idle-title">Enter a URL and press Open</h2>
      <p class="viewer__idle-sub">Your futuristic web viewer is ready.</p>
    </div>
    <div id="state-loading" class="viewer__state hidden">
      <div class="loader" aria-hidden="true">
        <div class="loader__ring"></div><div class="loader__ring"></div><div class="loader__ring"></div><div class="loader__core"></div>
      </div>
      <p id="loader-text" class="viewer__loader-label">Connecting...</p>
    </div>
    <div id="state-error" class="viewer__state hidden">
      <svg class="viewer__error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <h2 id="error-title" class="viewer__error-title">Something went wrong</h2>
      <p id="error-msg" class="viewer__error-msg">Could not load the requested URL.</p>
      <button id="btn-retry" class="btn btn--primary" style="margin-top:1.25rem"><span>Try Again</span></button>
    </div>
    <div id="state-frame" class="viewer__frame hidden">
      <iframe id="viewer-iframe" title="Web Viewer" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox" referrerpolicy="no-referrer"></iframe>
    </div>
  </main>

  <aside id="history-panel" class="sidebar" role="complementary" aria-label="URL history">
    <div class="sidebar__head">
      <h3 class="sidebar__title">History</h3>
      <button id="btn-clear-history" class="icon-btn icon-btn--sm" title="Clear all history" aria-label="Clear history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>
    <ul id="history-list" class="sidebar__list" role="list"></ul>
    <div id="history-empty" class="sidebar__empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <p>No history yet</p>
    </div>
  </aside>

</div>

<script>
(() => {
  'use strict';

  const $ = (sel, root = document) => root.querySelector(sel);

  function escapeHTML(str) {
    const el = document.createElement('span');
    el.textContent = str;
    return el.innerHTML;
  }

  /* ── DOM ────────────────────────────────────────────── */

  const dom = {
    urlInput:       $('#url-input'),
    btnOpen:        $('#btn-open'),
    btnStop:        $('#btn-stop'),
    btnPaste:       $('#btn-paste'),
    btnCopy:        $('#btn-copy'),
    btnTheme:       $('#btn-theme'),
    btnHistory:     $('#btn-history'),
    btnClearHist:   $('#btn-clear-history'),
    btnRetry:       $('#btn-retry'),
    statusBar:      $('#status-bar'),
    statusText:     $('#status-text'),
    progressBar:    $('#progress-bar'),
    stateIdle:      $('#state-idle'),
    stateLoading:   $('#state-loading'),
    stateError:     $('#state-error'),
    stateFrame:     $('#state-frame'),
    errorTitle:     $('#error-title'),
    errorMsg:       $('#error-msg'),
    loaderText:     $('#loader-text'),
    iframe:         $('#viewer-iframe'),
    historyPanel:   $('#history-panel'),
    historyList:    $('#history-list'),
    historyEmpty:   $('#history-empty'),
    historyOverlay: $('#history-overlay'),
    toastContainer: $('#toast-container'),
  };

  /* ── State ──────────────────────────────────────────── */

  const STORAGE = { theme: 'neo_theme', history: 'neo_history' };
  const MAX_HISTORY = 10;
  let state = { isLoading: false, historyOpen: false, history: [] };

  /* ── Theme ──────────────────────────────────────────── */

  function initTheme() {
    const saved = localStorage.getItem(STORAGE.theme);
    document.documentElement.setAttribute('data-theme', saved === 'light' ? 'light' : 'dark');
  }
  function toggleTheme() {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem(STORAGE.theme, next);
  }

  /* ── URL Normalization ──────────────────────────────── */

  function normalizeURL(raw) {
    if (!raw || typeof raw !== 'string') return null;
    let s = raw.trim().replace(/^["']+|["']+$/g, '');
    if (!s) return null;
    if (!/^https?:\/\//i.test(s)) s = 'https://' + s;
    try {
      const url = new URL(s);
      if (url.protocol !== 'http:' && url.protocol !== 'https:') return null;
      return url.href;
    } catch { return null; }
  }

  /* ── Viewer States ──────────────────────────────────── */

  const STATES = ['stateIdle', 'stateLoading', 'stateError', 'stateFrame'];

  function showState(active) {
    STATES.forEach(k => dom[k].classList.toggle('hidden', k !== active));
  }
  function resetViewer() {
    showState('stateIdle');
    dom.statusBar.classList.add('hidden');
    dom.progressBar.style.width = '0%';
    dom.iframe.onload = null;
    dom.iframe.onerror = null;
    dom.iframe.src = 'about:blank';
  }
  function showLoading() {
    showState('stateLoading');
    dom.statusBar.classList.remove('hidden');
    dom.progressBar.style.width = '0%';
    dom.statusText.textContent = 'Initializing...';
  }
  function showFrame() {
    showState('stateFrame');
    dom.statusBar.classList.add('hidden');
  }
  function showError(title, msg) {
    showState('stateError');
    dom.statusBar.classList.add('hidden');
    dom.errorTitle.textContent = title;
    dom.errorMsg.textContent = msg;
  }

  /* ── Typewriter ─────────────────────────────────────── */

  function typewrite(el, text, speed = 22) {
    el.textContent = '';
    let i = 0;
    const tick = () => { if (i < text.length) { el.textContent += text[i++]; setTimeout(tick, speed); } };
    tick();
  }

  /* ── Proxy Fetching ─────────────────────────────────── */

  const PROXIES = [
    'https://api.allorigins.win/raw?url=',
    'https://api.codetabs.com/v1/proxy?quest=',
  ];

  function rewriteURLs(html, baseURL) {
    let base;
    try { base = new URL(baseURL); } catch { return html; }
    const origin = base.origin;
    const dir = base.pathname.replace(/\/[^/]*$/, '/');

    html = html.replace(/(<base\s[^>]*href=["'])([^"']+)(["'])/i, '$1' + origin + dir + '$3');

    html = html.replace(/((?:src|href|poster|data|action)\s*=\s*["'])(?!data:|javascript:|https?:\/\/|#)([^"']+)(["'])/gi, (m, pre, path, suf) => {
      if (path.startsWith('//')) return pre + 'https:' + path + suf;
      try { return pre + new URL(path, base).href + suf; } catch { return m; }
    });

    html = html.replace(/(url\(\s*["']?)(?!data:|javascript:|https?:\/\/|#)([^"')]+)(["']?\s*\))/gi, (m, pre, path, suf) => {
      try { return pre + new URL(path, base).href + suf; } catch { return m; }
    });

    return html;
  }

  function ensureBaseTag(html, baseURL) {
    let base;
    try { base = new URL(baseURL); } catch { return html; }
    if (/<base\s/i.test(html)) return html;
    const tag = `<base href="${base.origin}${base.pathname.replace(/\/[^/]*$/, '/')}">`;
    return /<head[^>]*>/i.test(html) ? html.replace(/(<head[^>]*>)/i, '$1' + tag) : tag + html;
  }

  async function fetchViaProxy(url) {
    for (const proxy of PROXIES) {
      try {
        const r = await fetch(proxy + encodeURIComponent(url), { signal: AbortSignal.timeout(10000) });
        if (r.ok) { const t = await r.text(); if (t && t.length > 50) return t; }
      } catch {}
    }
    return null;
  }

  async function fetchDirect(url) {
    try {
      const r = await fetch(url, { mode: 'cors', signal: AbortSignal.timeout(8000) });
      if (r.ok) return await r.text();
    } catch {}
    return null;
  }

  /* ── Run URL ────────────────────────────────────────── */

  function runURL(url) {
    if (state.isLoading) return;
    state.isLoading = true;
    dom.btnOpen.disabled = true;
    dom.btnStop.disabled = false;
    showLoading();

    let settled = false;
    let timer = null;

    function settle(ok, msg) {
      if (settled) return;
      settled = true;
      state.isLoading = false;
      clearTimeout(timer);
      dom.progressBar.style.width = '100%';
      dom.iframe.onload = null;
      dom.iframe.onerror = null;
      setTimeout(() => {
        if (ok) { showFrame(); addToHistory(url); }
        else showError('Load Failed', msg || 'Could not load this site.');
        dom.btnOpen.disabled = false;
        dom.btnStop.disabled = true;
      }, 250);
    }

    const phases = [
      { text: 'Connecting...',       pct: 15,  delay: 300 },
      { text: 'Fetching content...', pct: 35,  delay: 400 },
      { text: 'Processing HTML...',  pct: 60,  delay: 350 },
      { text: 'Rendering view...',   pct: 85,  delay: 300 },
    ];
    let pi = 0;
    const tick = () => {
      if (pi >= phases.length || !state.isLoading) return;
      const p = phases[pi++];
      dom.statusText.textContent = p.text;
      dom.progressBar.style.width = p.pct + '%';
      typewrite(dom.loaderText, p.text);
      setTimeout(tick, p.delay);
    };
    tick();

    timer = setTimeout(() => settle(false, 'Timed out — the site took too long.'), 18000);

    (async () => {
      let html = await fetchDirect(url);
      if (!html) { dom.statusText.textContent = 'Using proxy...'; html = await fetchViaProxy(url); }
      if (!state.isLoading) return;
      if (!html) { settle(false, 'Could not fetch the page. The site may be unreachable.'); return; }

      html = ensureBaseTag(html, url);
      html = rewriteURLs(html, url);
      html = html.replace(/<script[^>]*>[\s\S]*?(top|parent|self)\s*(!=|===?|!==?)\s*(self|top|parent)[\s\S]*?<\/script>/gi, '<!-- removed -->');
      html = html.replace(/<meta[^>]*http-equiv\s*=\s*["']?X-Frame-Options["']?[^>]*>/gi, '');
      html = html.replace(/<meta[^>]*http-equiv\s*=\s*["']?Content-Security-Policy["']?[^>]*>/gi, '');

      dom.progressBar.style.width = '90%';
      const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      const blobURL = URL.createObjectURL(blob);

      dom.iframe.onload = () => { URL.revokeObjectURL(blobURL); setTimeout(() => settle(true), 200); };
      dom.iframe.onerror = () => { URL.revokeObjectURL(blobURL); settle(false, 'Failed to render the page.'); };
      dom.iframe.src = blobURL;
    })();
  }

  function openURL() {
    if (state.isLoading) return;
    const url = normalizeURL(dom.urlInput.value);
    if (!url) { showError('Invalid URL', 'Enter a valid URL (e.g. https://example.com).'); return; }
    dom.urlInput.value = url;
    runURL(url);
  }

  function stopLoading() {
    if (!state.isLoading) return;
    state.isLoading = false;
    dom.iframe.onload = null;
    dom.iframe.onerror = null;
    dom.iframe.src = 'about:blank';
    resetViewer();
    dom.btnOpen.disabled = false;
    dom.btnStop.disabled = true;
  }

  /* ── History ────────────────────────────────────────── */

  function loadHistory() {
    try { state.history = JSON.parse(localStorage.getItem(STORAGE.history)) || []; if (!Array.isArray(state.history)) state.history = []; } catch { state.history = []; }
    renderHistory();
  }
  function saveHistory() { localStorage.setItem(STORAGE.history, JSON.stringify(state.history)); }
  function addToHistory(url) {
    state.history = state.history.filter(h => h.url !== url);
    state.history.unshift({ url, ts: Date.now() });
    if (state.history.length > MAX_HISTORY) state.history = state.history.slice(0, MAX_HISTORY);
    saveHistory(); renderHistory();
  }
  function clearHistory() { state.history = []; saveHistory(); renderHistory(); showToast('History cleared'); }
  function formatTime(ts) {
    const d = Date.now() - ts;
    if (d < 60000) return 'now';
    if (d < 3600000) return Math.floor(d / 60000) + 'm';
    if (d < 86400000) return Math.floor(d / 3600000) + 'h';
    return new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }
  function renderHistory() {
    dom.historyList.innerHTML = '';
    dom.historyEmpty.classList.toggle('hidden', state.history.length > 0);
    const icon = `<svg class="sidebar__item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;
    state.history.forEach(item => {
      const li = document.createElement('li');
      li.className = 'sidebar__item';
      li.setAttribute('role', 'listitem');
      li.setAttribute('tabindex', '0');
      const display = item.url.replace(/^https?:\/\//, '');
      li.innerHTML = icon + `<span class="sidebar__item-url" title="${escapeHTML(item.url)}">${escapeHTML(display)}</span><span class="sidebar__item-time">${formatTime(item.ts)}</span>`;
      const go = () => { dom.urlInput.value = item.url; closeHistory(); runURL(item.url); };
      li.addEventListener('click', go);
      li.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(); } });
      dom.historyList.appendChild(li);
    });
  }

  /* ── History Panel ──────────────────────────────────── */

  function toggleHistory() { state.historyOpen ? closeHistory() : openHistory(); }
  function openHistory() {
    state.historyOpen = true;
    dom.historyPanel.classList.add('open');
    dom.historyOverlay.setAttribute('aria-hidden', 'false');
    requestAnimationFrame(() => dom.historyOverlay.classList.add('visible'));
  }
  function closeHistory() {
    state.historyOpen = false;
    dom.historyPanel.classList.remove('open');
    dom.historyOverlay.classList.remove('visible');
    dom.historyOverlay.setAttribute('aria-hidden', 'true');
  }

  /* ── Clipboard ──────────────────────────────────────── */

  async function pasteFromClipboard() {
    try { const t = await navigator.clipboard.readText(); if (t) { dom.urlInput.value = t.trim(); dom.urlInput.focus(); showToast('Pasted from clipboard'); } }
    catch { showToast('Clipboard access denied'); }
  }
  async function copyToClipboard() {
    const url = normalizeURL(dom.urlInput.value);
    if (!url) { showToast('No valid URL to copy'); return; }
    try { await navigator.clipboard.writeText(url); showToast('URL copied'); }
    catch { showToast('Copy failed'); }
  }

  /* ── Toast ──────────────────────────────────────────── */

  function showToast(msg, dur = 2200) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    dom.toastContainer.appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, dur);
  }

  /* ── Particles ──────────────────────────────────────── */

  function initParticles() {
    const canvas = $('#particle-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let w, h;
    const pts = [];
    const COUNT = 55, RADIUS = 140;

    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    function seed() {
      pts.length = 0;
      for (let i = 0; i < COUNT; i++) pts.push({ x: Math.random() * w, y: Math.random() * h, vx: (Math.random() - 0.5) * 0.35, vy: (Math.random() - 0.5) * 0.35, r: Math.random() * 1.4 + 0.4 });
    }
    function frame() {
      ctx.clearRect(0, 0, w, h);
      const rgb = document.documentElement.getAttribute('data-theme') === 'dark' ? '124,58,237' : '109,40,217';
      for (let i = 0; i < pts.length; i++) {
        const p = pts[i];
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > w) p.vx *= -1;
        if (p.y < 0 || p.y > h) p.vy *= -1;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${rgb},0.3)`; ctx.fill();
        for (let j = i + 1; j < pts.length; j++) {
          const q = pts[j], dx = p.x - q.x, dy = p.y - q.y, d = Math.sqrt(dx * dx + dy * dy);
          if (d < RADIUS) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.strokeStyle = `rgba(${rgb},${0.07 * (1 - d / RADIUS)})`; ctx.lineWidth = 0.6; ctx.stroke(); }
        }
      }
      requestAnimationFrame(frame);
    }
    resize(); seed(); frame();
    window.addEventListener('resize', () => { resize(); seed(); });
  }

  /* ── Events ─────────────────────────────────────────── */

  dom.btnOpen.addEventListener('click', openURL);
  dom.btnStop.addEventListener('click', stopLoading);
  dom.btnRetry.addEventListener('click', openURL);
  dom.btnTheme.addEventListener('click', toggleTheme);
  dom.btnPaste.addEventListener('click', pasteFromClipboard);
  dom.btnCopy.addEventListener('click', copyToClipboard);
  dom.btnHistory.addEventListener('click', toggleHistory);
  dom.btnClearHist.addEventListener('click', clearHistory);
  dom.urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') openURL(); });
  dom.historyOverlay.addEventListener('click', closeHistory);
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && state.historyOpen) closeHistory(); });

  /* ── Boot ───────────────────────────────────────────── */

  initTheme();
  loadHistory();
  initParticles();
  dom.urlInput.focus();
})();
</script>

</body>
</html>
